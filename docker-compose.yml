version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./papers:/app/papers
      - ./chunks:/app/chunks
      - ./embeddings:/app/embeddings
      - ./knowledge_graph:/app/knowledge_graph
    environment:
      - PYTHONUNBUFFERED=1
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
